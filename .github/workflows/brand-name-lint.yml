name: Brand name lint

on:
  pull_request:
  push:
    branches: [main]

jobs:
  brand-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Run brand lint
        run: ./scripts/brand-lint.sh
